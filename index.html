<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora do quiz!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="screen active" id="start-screen">
                <h1>HORA DO QUIZ!</h1>
                <p>Teste seu conhecimento!</p>
                <button id="start-btn">Start Screen</button>

        </div> 


        <div class="screen" id="quiz-screen">
            <div class="quiz-header">
                <h2 id="question-text">Questão vem aqui</h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of <span>5</span>
                    </p>

                    <p>
                        Score: <span id="score"></span>
                    </p>
                </div>

                <div id="answers-container" class="answers-container">
                    <!--Reposta vão estar aqui atraves do js
                    em algum momento do js-->
                </div>

                <div class="progress-bar">
                    <div id="progress" class="progress"></div>
                </div>

                <div id="result-screen" class="screen">

                    <h1>Resultados finais</h1>
                    <div class="result-info">
                        <p>You scored  <span id="final-score">0</span>out of <span id="max-score">5</span>
                        </p>
                        <div id="result-message">Good job!</div>
                        
                    </div>
                    <button id="restart-btn">Refaça o quiz!</button>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
